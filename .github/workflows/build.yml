name: Build
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-24.04
    container: debian:trixie
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            extra-cmake-modules \
            libkf6windowsystem-dev libkf6i18n-dev libkf6config-dev \
            libkf6guiaddons-dev libkf6iconthemes-dev libkf6configwidgets-dev \
            libkf6kcmutils-dev libkf6integration-dev libkf6waylandclient-dev \
            libxcb1-dev libxcb-ewmh-dev libxcb-randr0-dev libxcb-xfixes0-dev \
            pkg-config
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build --parallel
